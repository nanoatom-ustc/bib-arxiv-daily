arxiv:
  categories:
    - quant-ph
    - physics
  max_candidates: 10

embedding:
  model: BAAI/bge-small-en-v1.5
  batch_size: 32

ranking:
  top_k_neighbors: 6
  max_results: 15

email:
  subject_prefix: "[arXiv Daily]"
  include_pdf_links: true
  send_empty_email: true

runtime:
  data_dir: data
  output_html: output/latest_report.html
  cache_dir: .cache/recommender
